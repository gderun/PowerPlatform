name: Download, unpack and commit the solution to git
run-name: Getting ${{ github.event.inputs.solution_name }} from pipelines host environment and committing
on:
  workflow_dispatch:
    inputs:
      environment_url:
        description: "The url of the Dataverse environment to export solution"
        required: true
      solution_name:
        description: "Name of the Solution in Dataverse environment"
        required: true
      user_name: 
        description: "User name for the commit"
        required: true
      user_email: 
        description: "User email for the commit"
        required: true
      source_branch:
        description: "Branch for the solution commit"
        required: true
      target_branch:
        description: "Branch to create for the solution commit"
        required: false
      commit_message:
        description: "Message to provide for the commit"
        required: true
permissions:
  contents: write
jobs:
  export-unpack-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
            ref: ${{ github.event.inputs.source_branch }}

      - name: Install Power Platform Build Tools
        uses: microsoft/powerplatform-actions/actions-install@latest

      - name: Verify Service Connection
        uses: microsoft/powerplatform-actions/who-am-i@latest
        with:
          app-id: ${{secrets.CLIENT_ID}}
          client-secret: ${{secrets.CLIENT_SECRET}}
          tenant-id: ${{secrets.TENANT_ID}}
          environment-url: "${{ github.event.inputs.environment_url }}"

      # Commit changes to the existing or new branch
      - name: create new branch if specified
        shell: pwsh
        run: |
            if('${{ github.event.inputs.target_branch }}' -ne '') {
                git checkout -b ${{ github.event.inputs.target_branch }} ${{ github.event.inputs.source_branch }}
            }

      - name: Export Unmanaged Solution
        uses: microsoft/powerplatform-actions/export-solution@latest
        with:
          environment-url: "${{ github.event.inputs.environment_url }}"
          app-id: ${{secrets.CLIENT_ID}}
          client-secret: ${{secrets.CLIENT_SECRET}}
          tenant-id: ${{secrets.TENANT_ID}}
          solution-name: "${{ github.event.inputs.solution_name }}"
          solution-output-file: "${{ github.event.inputs.solution_name }}.zip"
          managed: false

      - name: Unpack Unmanaged Solution
        uses: microsoft/powerplatform-actions/unpack-solution@latest
        with:
          solution-file: "${{ github.event.inputs.solution_name }}.zip"
          solution-folder: "${{ github.event.repository.name }}/src/${{ github.event.inputs.solution_name }}"
          solution-type: 'Unmanaged'
          process-canvas-apps: false
          overwrite-files: true

      # Commit changes to the existing or new branch
      - name: commit changes
        shell: pwsh
        run: |
          rm -rf ${{ github.event.inputs.solution_name }}.zip
          rm -rf ${{ github.event.inputs.solution_name }}_managed.zip
          git config user.name ${{ github.event.inputs.user_name }}
          git config user.email ${{ github.event.inputs.user_email }}
          git pull 
          git add --all
          git commit -am "${{ github.event.inputs.commit_message }}" --allow-empty

      # Push the committed changes to the source branch
      - name: push to branch
        shell: pwsh
        run: |
          if('${{ github.event.inputs.target_branch }}' -ne '') {
              git push origin ${{ github.event.inputs.target_branch }}
          } else {
              git push origin ${{ github.event.inputs.source_branch }}
          }
